<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ZOVEX</title>
    <script>
      var l = window.location;
      var path = l.pathname.replace('/zovex/', '').replace('/zovex', '');
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/zovex/' + (path ? '?/' + path : '') + l.hash);
    </script>
  </head>
</html>
