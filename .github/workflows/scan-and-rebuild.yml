name: Scan & Rebuild

on:
  # הפעלה ידנית מממשק GitHub
  workflow_dispatch:
    inputs:
      fix:
        description: 'תקן קישורי טלגרם ישנים אוטומטית (t.me → פרוקסי)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # רץ אוטומטית כל פעם שמישהו מעדכן movies.json או live.json
  push:
    branches: [main]
    paths:
      - 'public/movies.json'
      - 'public/live.json'
      - 'public/apikeys.json'
      - 'src/**'
      - 'package.json'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scan-rebuild"
  cancel-in-progress: true

jobs:
  scan-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Scan media files
        run: |
          if [ "${{ github.event.inputs.fix }}" = "true" ]; then
            echo "🔧 מפעיל תיקון אוטומטי..."
            node scripts/scan.js --fix
          else
            node scripts/scan.js
          fi

      - name: Commit fixes (if any)
        if: github.event.inputs.fix == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/movies.json
          git diff --cached --quiet || git commit -m "auto: המרת קישורי טלגרם לפרוקסי"
          git push || true

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: scan-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
